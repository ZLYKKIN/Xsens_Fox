name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.2.0). Leave empty for a draft test build.'
        required: false
        default: ''

# Required so the default GITHUB_TOKEN can:
#   * create / update a GitHub Release (contents: write)
#   * fetch PR titles for `generate_release_notes: true` (pull-requests: read)
permissions:
  contents: write
  pull-requests: read

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022

    env:
      QT_VERSION: 6.5.3
      QT_ARCH: win64_msvc2019_64
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: ${{ env.QT_ARCH }}
          modules: 'qtimageformats'
          cache: true

      - name: Configure (CMake + Ninja)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j

      - name: Resolve release name
        id: name
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v') { $tag = 'dev-' + '${{ github.sha }}'.Substring(0, 7) }
          $ver = $tag -replace '^v',''
          $pkg = "fox_mocap-$tag-windows-x64"
          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Append
          "ver=$ver" | Out-File $env:GITHUB_OUTPUT -Append
          "pkg=$pkg" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Stage portable ZIP
        shell: pwsh
        run: |
          $pkg = '${{ steps.name.outputs.pkg }}'
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item -Recurse -Force build/bin/* $pkg/
          Copy-Item -Force README.md $pkg/README.md
          Copy-Item -Force LICENSE   $pkg/LICENSE.txt
          if (Test-Path image) {
            New-Item -ItemType Directory -Force -Path "$pkg/image" | Out-Null
            Copy-Item -Recurse -Force image/* "$pkg/image/"
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$pkg/*" -DestinationPath "dist/$pkg.zip" -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup 6 not preinstalled; installing via choco..."
            choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          Write-Host "Using ISCC at: $iscc"
          $ver = '${{ steps.name.outputs.ver }}'
          & "$iscc" `
              "/DAppVersion=$ver" `
              "/DBuildDir=$PWD\build\bin" `
              "/DOutDir=$PWD\dist" `
              "$PWD\installer\fox_mocap.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }

      - name: Compute SHA-256 for release assets
        shell: pwsh
        run: |
          Get-ChildItem dist -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ascii
          }
          Get-ChildItem dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.pkg }}
          path: |
            dist/**
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body: |
            **Fox Mocap** — free Windows app that captures full-body motion from
            an Xsens MVN suit and streams it live to Unreal Engine and Blender.

            ### Download

            * **`FoxMocapSetup-${{ steps.name.outputs.ver }}-windows-x64.exe`** — installer (recommended).
            * `fox_mocap-${{ github.ref_name }}-windows-x64.zip` — portable, just unzip and run.
            * `*.sha256` — checksums.

            ### What's inside

            * `fox_mocap.exe` (Qt 6.5.3 / MSVC, Windows 10/11 x64).
            * Optional plugins: **Blender** (MVN Live add-on + test project) and **Unreal Engine 5.6** (LiveLink plugin source).
            * Optional hardware drivers: Silicon Labs USBXpress, D-Link DUB-13X2, Apple Bonjour, Allied Vision GigE Filter.
            * Optional firewall rule opening UDP `9763`.

            Everything is opt-in on the installer's *Components* page — pick what your rig needs.

            > SmartScreen may warn about an unknown publisher (the binary is not code-signed). Compare the SHA-256 with the attached `.sha256` and choose *More info → Run anyway*.

            Found a bug? <https://github.com/ZLYKKIN/Xsens_Fox/issues> or Telegram [@ZLYKKIN_FOX](https://t.me/ZLYKKIN_FOX).
