name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.2.0). Leave empty for a draft test build.'
        required: false
        default: ''

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022

    env:
      QT_VERSION: 6.5.3
      QT_ARCH: win64_msvc2019_64
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: ${{ env.QT_ARCH }}
          modules: 'qtimageformats'
          cache: true

      - name: Configure (CMake + Ninja)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j

      - name: Resolve release name
        id: name
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v') { $tag = 'dev-' + '${{ github.sha }}'.Substring(0, 7) }
          $ver = $tag -replace '^v',''
          $pkg = "fox_mocap-$tag-windows-x64"
          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Append
          "ver=$ver" | Out-File $env:GITHUB_OUTPUT -Append
          "pkg=$pkg" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Stage portable ZIP
        shell: pwsh
        run: |
          $pkg = '${{ steps.name.outputs.pkg }}'
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item -Recurse -Force build/bin/* $pkg/
          Copy-Item -Force README.md $pkg/README.md
          Copy-Item -Force LICENSE   $pkg/LICENSE.txt
          if (Test-Path image) {
            New-Item -ItemType Directory -Force -Path "$pkg/image" | Out-Null
            Copy-Item -Recurse -Force image/* "$pkg/image/"
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$pkg/*" -DestinationPath "dist/$pkg.zip" -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup 6 not preinstalled; installing via choco..."
            choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          Write-Host "Using ISCC at: $iscc"
          $ver = '${{ steps.name.outputs.ver }}'
          & "$iscc" `
              "/DAppVersion=$ver" `
              "/DBuildDir=$PWD\build\bin" `
              "/DOutDir=$PWD\dist" `
              "$PWD\installer\fox_mocap.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }

      - name: Compute SHA-256 for release assets
        shell: pwsh
        run: |
          Get-ChildItem dist -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ascii
          }
          Get-ChildItem dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.pkg }}
          path: |
            dist/**
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body: |
            ## Fox Mocap ${{ github.ref_name }} — Windows x64

            ### Скачать
            * **`FoxMocapSetup-${{ steps.name.outputs.ver }}-windows-x64.exe`** — установщик с выбором папки, лицензией и опциональными плагинами (рекомендуется).
            * `fox_mocap-${{ github.ref_name }}-windows-x64.zip` — portable-версия, просто распакуйте и запустите `fox_mocap.exe`.
            * `.sha256` — контрольные суммы для верификации.

            ### Что внутри
            * `fox_mocap.exe` собран на windows-2022 / MSVC 19.3x / Qt 6.5.3.
            * Qt-рантайм разложен через `windeployqt`, драйверные DLL Xsens / Manus — в комплекте.
            * Опциональный Blender-плагин (`MVNBlenderPlugin-main.zip` + тест-проект) ставится по галочке в установщике.
            * Установщик открывает UDP-порт 9763 в Windows Firewall (можно снять галочку на шаге "Дополнительные задачи").

            > SmartScreen может предупредить о незнакомом издателе — бинарь не подписан. Сравните SHA-256 с прикреплённым `.sha256` и нажмите «Подробнее → Выполнить в любом случае».
