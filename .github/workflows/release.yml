name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.2.0). Leave empty for a draft test build.'
        required: false
        default: ''

# Required so the default GITHUB_TOKEN can:
#   * create / update a GitHub Release (contents: write)
#   * fetch PR titles for `generate_release_notes: true` (pull-requests: read)
permissions:
  contents: write
  pull-requests: read

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022

    env:
      QT_VERSION: 6.5.3
      QT_ARCH: win64_msvc2019_64
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: ${{ env.QT_ARCH }}
          modules: 'qtimageformats'
          cache: true

      - name: Configure (CMake + Ninja)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j

      - name: Resolve release name
        id: name
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v') { $tag = 'dev-' + '${{ github.sha }}'.Substring(0, 7) }
          $ver = $tag -replace '^v',''
          $pkg = "fox_mocap-$tag-windows-x64"
          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Append
          "ver=$ver" | Out-File $env:GITHUB_OUTPUT -Append
          "pkg=$pkg" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Stage portable ZIP
        shell: pwsh
        run: |
          $pkg = '${{ steps.name.outputs.pkg }}'
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item -Recurse -Force build/bin/* $pkg/
          Copy-Item -Force README.md $pkg/README.md
          Copy-Item -Force LICENSE   $pkg/LICENSE.txt
          if (Test-Path image) {
            New-Item -ItemType Directory -Force -Path "$pkg/image" | Out-Null
            Copy-Item -Recurse -Force image/* "$pkg/image/"
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$pkg/*" -DestinationPath "dist/$pkg.zip" -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup 6 not preinstalled; installing via choco..."
            choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          Write-Host "Using ISCC at: $iscc"
          $ver = '${{ steps.name.outputs.ver }}'
          & "$iscc" `
              "/DAppVersion=$ver" `
              "/DBuildDir=$PWD\build\bin" `
              "/DOutDir=$PWD\dist" `
              "$PWD\installer\fox_mocap.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }

      - name: Compute SHA-256 for release assets
        shell: pwsh
        run: |
          Get-ChildItem dist -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ascii
          }
          Get-ChildItem dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.pkg }}
          path: |
            dist/**
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag    = '${{ github.ref_name }}'
          $sha    = '${{ github.sha }}'
          $isPre  = $tag -match '-(beta|rc|alpha|pre)'

          # Determine if a release already exists for this tag.  `gh release
          # view` exits with non-zero when there isn't one — we explicitly
          # capture that instead of treating it as a workflow failure.
          $existing = $null
          try {
              $existing = gh release view $tag --json tagName,body,isPrerelease | ConvertFrom-Json
          } catch {
              $existing = $null
          }

          if (-not $existing) {
              # No release yet — create one with a minimal body.  The
              # maintainer typically creates releases manually with rich
              # notes; this is the fallback for pure tag-push.
              $preFlag = if ($isPre) { '--prerelease' } else { '--latest' }
              gh release create $tag `
                  --title "Fox Mocap $tag" `
                  --notes "Automated CI build for tag ``$tag`` (commit ``$sha``)." `
                  $preFlag
              if ($LASTEXITCODE -ne 0) { throw "gh release create failed ($LASTEXITCODE)" }
          } else {
              # Release exists (maintainer pre-populated body & notes).  We
              # only sync the prerelease flag with the tag suffix and leave
              # the body intact.  --draft=false is always set so a release
              # that ended up in draft state (e.g. because the tag was
              # deleted-and-re-pushed during a re-tag) gets republished on
              # the next workflow run instead of silently staying hidden.
              $editArgs = @('release','edit',$tag,'--draft=false')
              if ($isPre)         { $editArgs += '--prerelease' }
              else                { $editArgs += '--prerelease=false'; $editArgs += '--latest=true' }
              gh @editArgs
              if ($LASTEXITCODE -ne 0) { throw "gh release edit failed ($LASTEXITCODE)" }
          }

          # Upload (or replace) the assets we just built.  --clobber makes
          # the upload idempotent: a re-run of the workflow swaps the file
          # in place instead of failing with "asset already exists".
          $assets = @(
              Get-ChildItem dist\*.exe,
                            dist\*.zip,
                            dist\*.sha256 -ErrorAction Stop
          ) | ForEach-Object { $_.FullName }
          if ($assets.Count -eq 0) { throw "No release assets found in dist\" }

          Write-Host "Uploading $($assets.Count) asset(s) to release $tag :"
          $assets | ForEach-Object { Write-Host "  $_" }
          gh release upload $tag @assets --clobber
          if ($LASTEXITCODE -ne 0) { throw "gh release upload failed ($LASTEXITCODE)" }

          Write-Host "Release $tag published / updated successfully."
