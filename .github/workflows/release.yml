name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). Leave empty for a draft test build.'
        required: false
        default: ''

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022

    env:
      QT_VERSION: 6.5.3
      QT_ARCH: win64_msvc2019_64
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: ${{ env.QT_ARCH }}
          modules: 'qtimageformats'
          cache: true

      - name: Configure (CMake + Ninja)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j

      - name: Resolve release name
        id: name
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v') { $tag = 'dev-${{ github.sha }}'.Substring(0, 11) }
          $pkg = "fox_mocap-$tag-windows-x64"
          "tag=$tag"   | Out-File $env:GITHUB_OUTPUT -Append
          "pkg=$pkg"   | Out-File $env:GITHUB_OUTPUT -Append

      - name: Stage release files
        shell: pwsh
        run: |
          $pkg = '${{ steps.name.outputs.pkg }}'
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item -Recurse -Force build/bin/* $pkg/
          Copy-Item -Force README.md $pkg/README.md
          if (Test-Path image) {
            New-Item -ItemType Directory -Force -Path "$pkg/image" | Out-Null
            Copy-Item -Recurse -Force image/* "$pkg/image/"
          }

      - name: Pack ZIP
        shell: pwsh
        run: |
          $pkg = '${{ steps.name.outputs.pkg }}'
          Compress-Archive -Path "$pkg/*" -DestinationPath "$pkg.zip" -Force
          Get-FileHash "$pkg.zip" -Algorithm SHA256 |
            Select-Object -ExpandProperty Hash |
            Out-File "$pkg.zip.sha256" -Encoding ascii

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.pkg }}
          path: |
            ${{ steps.name.outputs.pkg }}.zip
            ${{ steps.name.outputs.pkg }}.zip.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.name.outputs.pkg }}.zip
            ${{ steps.name.outputs.pkg }}.zip.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
