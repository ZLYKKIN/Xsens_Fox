name: Tests

# Runs the foxmath / foxwire unit tests on Linux for every push and PR.  These
# targets need only Qt6 Core/Gui + Eigen (no Xsens/Manus hardware, no Widgets/
# OpenGL/Network), so they build and run on a plain Ubuntu runner.  The Windows
# application itself is built/released by release.yml.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  unit-tests:
    name: foxmath / foxwire (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + Eigen
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev libeigen3-dev cmake g++

      - name: Configure (tests only)
        run: cmake -S . -B build -DFOX_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      # Build ONLY the test executables — never the fox_mocap app target, which
      # depends on Windows-only headers (windows.h / dwmapi / SEH).
      - name: Build test targets
        run: cmake --build build --target test_foxmath test_foxwire -j

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure
